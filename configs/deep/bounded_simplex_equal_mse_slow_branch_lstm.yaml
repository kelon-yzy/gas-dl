# 消融实验: bounded_simplex + 3-task loss + slow_branch LSTM
# 目的: LSTM 时序融合器 + 3-task loss (只监督 H2/CH4/CO2，N2 由 100-sum 推导)
#   消除 N2 loss 对 CH4 的反向梯度耦合。
# 基线对照:
#   - bounded_simplex_3task_loss_slow_branch.yaml (TCN + 3-task)
#   - bounded_simplex_equal_mse_slow_branch.yaml (TCN + 4-task)

run:
  name: v3_bounded_simplex_3task_loss_slow_branch_lstm_seed42
  seed: 42
  output_dir: outputs/exp02_deep_e2e/v3_bounded_simplex_3task_loss_slow_branch_lstm_seed42

data:
  dataset_type: waveform_v3
  npz_path: ../../data/waveform_v3
  index_path: ../../data/waveform_v3/sequence_index.csv
  split_dir: ../../data/waveform_v3/splits
  scaler_path: ../../data/waveform_v3/scalers/scaler_slow_sequence.json
  split_strategy: existing_or_group_mixture
  time_window: all

model:
  name: cnn1d_lstm_fusion_slow_branch
  slow_dim: 8
  waveform_embedding_dim: 64
  acoustic_channels: [16, 32, 64, 64]
  acoustic_kernel_size: 7
  acoustic_dropout: 0.15
  lstm_hidden_size: 64
  lstm_num_layers: 1
  lstm_bidirectional: false
  lstm_dropout: 0.0
  head_dropout: 0.25
  out_dim: 4
  use_ultrasonic: true
  use_fiber_mic: true
  derive_last: true
  derive_last_mode: bounded_simplex
  output_prior: [9.288469, 75.755157, 4.994778, 9.961745]
  slow_encoder:
    enabled: true
    hidden_dim: 32
    embedding_dim: 64

training:
  epochs: 150
  batch_size: 128
  device: auto
  amp: true
  compile: false                 # 关闭 torch.compile 以节省显存，支持多实验并行
  optimizer: adamw
  learning_rate: 0.00015
  weight_decay: 0.01
  loss: mse
  label_balanced_loss: false
  uncertainty_weighted: null
  loss_columns: 3                 # 只对前 3 列 (H2/CH4/CO2) 计算 loss，N2 无梯度
  sum_constraint: null
  early_stopping_patience: 30
  num_workers: 12
  eval_num_workers: 4
  grad_clip_norm: 1.0
  cudnn_benchmark: true
  lr_scheduler:
    type: cosine_warmup
    warmup_epochs: 20
    eta_min: 0.00001
