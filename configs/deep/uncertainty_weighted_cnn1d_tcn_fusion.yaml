# 实验: 可学习不确定性加权 (Kendall et al., CVPR 2018)
# 目标: 解决 CH₄ 系统性低估问题
# 变更: 移除 label_balanced_loss，启用 uncertainty_weighted 自动平衡各组分权重
# 同时: 降低学习率(0.0003→0.0002)、增大batch(32→64)、加长warmup(10→15)

run:
  name: v3_uw_cnn1d_tcn_fusion_seed42
  seed: 42
  output_dir: outputs/exp02_deep_e2e/v3_uw_cnn1d_tcn_fusion_seed42

data:
  dataset_type: waveform_v3
  npz_path: ../../data/waveform_v3
  index_path: ../../data/waveform_v3/sequence_index.csv
  split_dir: ../../data/waveform_v3/splits
  scaler_path: ../../data/waveform_v3/scalers/scaler_slow_sequence.json
  split_strategy: existing_or_group_mixture
  time_window: all

model:
  name: cnn1d_tcn_fusion
  slow_dim: 8
  waveform_embedding_dim: 64
  acoustic_channels: [16, 32, 64, 64]
  acoustic_kernel_size: 7
  acoustic_dropout: 0.15
  tcn_channels: [64, 64, 64]
  tcn_kernel_size: 3
  tcn_dropout: 0.25
  head_dropout: 0.25
  out_dim: 4
  use_ultrasonic: true
  use_fiber_mic: true

training:
  epochs: 150
  batch_size: 64
  device: auto
  amp: false
  optimizer: adamw
  learning_rate: 0.0002
  weight_decay: 0.01
  loss: mse
  # 关闭旧的 1/std² 加权，改用可学习不确定性加权
  label_balanced_loss: false
  uncertainty_weighted:
    num_tasks: 4
    init_log_sigma: 0.0    # 初始 σ=1，各组分等权起步
    lr_multiplier: 10.0    # σ参数学习率 = 模型lr × 10
  sum_constraint:
    weight: 0.2
    target_sum: 100.0
    penalty: mse
  early_stopping_patience: 30
  num_workers: 4
  eval_num_workers: 2
  grad_clip_norm: 1.0
  cudnn_benchmark: true
  lr_scheduler:
    type: cosine_warmup
    warmup_epochs: 15
    eta_min: 0.00001
