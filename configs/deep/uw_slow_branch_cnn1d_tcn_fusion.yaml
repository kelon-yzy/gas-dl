# 实验: slow_branch + 可学习不确定性加权 (Kendall et al., CVPR 2018)
# 目标: 缓解 CH4-N2 误差互换 (互相关 -0.94)、抬升 N2 R^2 (基线 0.632)
# 变更对比 slow_branch_cnn1d_tcn_fusion.yaml:
#   - 启用 uncertainty_weighted: 自动学每个组分权重, 避免 CH4 (var 占比 49.5%) 主导
#   - 保持 sum_constraint=null: 模型 GasHeadNormalize 已用 softplus+normalize 硬约束 sum=100
#   - 其余结构 / 学习率 / batch 与基线一致, 单变量对照

run:
  name: v3_uw_slow_branch_cnn1d_tcn_fusion_seed42
  seed: 42
  output_dir: outputs/exp02_deep_e2e/v3_uw_slow_branch_cnn1d_tcn_fusion_seed42

data:
  dataset_type: waveform_v3
  npz_path: ../../data/waveform_v3
  index_path: ../../data/waveform_v3/sequence_index.csv
  split_dir: ../../data/waveform_v3/splits
  scaler_path: ../../data/waveform_v3/scalers/scaler_slow_sequence.json
  split_strategy: existing_or_group_mixture
  time_window: all

model:
  name: cnn1d_tcn_fusion_slow_branch
  slow_dim: 8
  waveform_embedding_dim: 64
  acoustic_channels: [16, 32, 64, 64]
  acoustic_kernel_size: 7
  acoustic_dropout: 0.15
  tcn_channels: [64, 64, 64]
  tcn_kernel_size: 3
  tcn_dropout: 0.25
  head_dropout: 0.25
  out_dim: 4
  use_ultrasonic: true
  use_fiber_mic: true
  slow_encoder:
    enabled: true
    hidden_dim: 32
    embedding_dim: 64

training:
  epochs: 150
  batch_size: 128
  device: auto
  amp: true
  optimizer: adamw
  learning_rate: 0.0002
  weight_decay: 0.01
  loss: mse
  label_balanced_loss: false
  uncertainty_weighted:
    num_tasks: 4
    init_log_sigma: 0.0    # 初始 sigma=1, 各组分等权起步
    lr_multiplier: 10.0    # sigma 参数学习率 = 模型 lr x 10
  sum_constraint: null     # GasHeadNormalize 已硬约束 sum=100, 不需要再加
  early_stopping_patience: 30
  num_workers: 8
  eval_num_workers: 2
  grad_clip_norm: 1.0
  cudnn_benchmark: true
  lr_scheduler:
    type: cosine_warmup
    warmup_epochs: 15
    eta_min: 0.00001
